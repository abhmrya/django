<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input
        type="text"
        name="username"
        required
    >

    <br><br>

    <label>Password</label>
    <input
        type="password"
        name="password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<br>

<a href="{% url 'register' %}">
    Register
</a>

{% if messages %}
    {% for message in messages %}
        <p style="color:red;">
            {{ message }}
        </p>
    {% endfor %}
{% endif %}

</body>
</html>
