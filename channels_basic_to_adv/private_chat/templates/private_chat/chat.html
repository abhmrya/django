<!DOCTYPE html>
<html>

<head>

    <title>Private Chat</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            background:#ece5dd;

        }

        .chat-container{

            width:700px;

            margin:30px auto;

            background:white;

            border-radius:10px;

            overflow:hidden;

            box-shadow:0 0 10px rgba(0,0,0,.2);

        }

        .header{

            background:#075e54;

            color:white;

            padding:15px;

            display:flex;

            justify-content:space-between;

            align-items:center;

        }

        #status{

            font-size:13px;

            color:#d8ffd8;

        }

        .messages{

            height:500px;

            overflow-y:auto;

            padding:20px;

            background:#efeae2;

        }

        .message{

            padding:10px;

            margin-bottom:10px;

            border-radius:8px;

            max-width:70%;

            word-wrap:break-word;

        }

        .me{

            margin-left:auto;

            background:#dcf8c6;

        }

        .other{

            margin-right:auto;

            background:white;

        }

        .sender{

            font-weight:bold;

            margin-bottom:5px;

        }

        .time{

            font-size:11px;

            color:gray;

            text-align:right;

            margin-top:5px;

        }

        .typing{

            padding:10px;

            font-style:italic;

            color:#555;

        }

        .input-area{

            display:flex;

            padding:15px;

            background:white;

            gap:10px;

        }

        #message{

            flex:1;

            padding:12px;

            border:1px solid #ccc;

            border-radius:6px;

        }

        button{

            padding:12px 25px;

            background:#128c7e;

            color:white;

            border:none;

            border-radius:6px;

            cursor:pointer;

        }

        button:hover{

            background:#0f7469;

        }

    </style>

</head>

<body>

<div class="chat-container">

    <div class="header">

        <div>

            <h2>

                {{ receiver.username }}

            </h2>

            <div id="status">

                Offline

            </div>

        </div>

    </div>

    <div
        class="messages"
        id="messages"
    >

    </div>

    <div
        class="typing"
        id="typing"
    >

    </div>

    <div class="input-area">

        <input

            type="text"

            id="message"

            placeholder="Type Message"

        >

        <button
            id="sendBtn"
        >

            Send

        </button>

    </div>

</div>

<script>

const receiverId="{{ receiver.id }}";

const currentUser="{{ request.user.username }}";

const socket=new WebSocket(

    "ws://"

    +window.location.host+

    "/ws/private-chat/"

    +receiverId+

    "/"

);

</script>

<script src="{% static 'private_chat/chat.js' %}"></script>

</body>
</html>
